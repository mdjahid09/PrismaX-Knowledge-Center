<!doctype html>
<html lang="en">
  <head>
    <script id="fetch-writable-fix">
      (function() {
        try {
          var originalFetch = window.fetch;
          var curFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return curFetch;
            },
            set: function(val) {
              curFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Failed to inject window.fetch writable wrapper:", e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PrismaX Knowledge Center</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
